---
- name: Download sur5r keyring
  ansible.builtin.get_url:
    url: https://debian.sur5r.net/i3/pool/universe/s/sur5r-keyring/sur5r-keyring_2025.12.14_all.deb
    dest: /tmp/sur5r-keyring.deb
    checksum: sha256:2c816fbd12ea4d84811818aed0ce3a5da589be1afa30833eb32abc1e4fe6349e

- name: Install sur5r keyring
  ansible.builtin.apt:
    deb: /tmp/sur5r-keyring.deb
    state: present

- name: Get Ubuntu codename
  ansible.builtin.shell: grep '^VERSION_CODENAME=' /etc/os-release | cut -f2 -d=
  register: ubuntu_codename
  changed_when: false

- name: Add sur5r-i3 repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/sur5r-keyring.gpg] http://debian.sur5r.net/i3/ {{ ubuntu_codename.stdout }} universe"
    filename: sur5r-i3
    state: present
    update_cache: false

# - name: Configure apt pinning for sur5r-i3 repository (priority over standard repos)
#   ansible.builtin.copy:
#     dest: /etc/apt/preferences.d/sur5r-i3
#     content: |
#       Package: i3 i3-wm i3bar i3status i3lock i3blocks
#       Pin: origin debian.sur5r.net
#       Pin-Priority: 1001
#     mode: '0644'

- name: Install i3 from sur5r repository
  ansible.builtin.apt:
    name: i3
    state: latest
    update_cache: true

- name: Install i3 and core packages
  ansible.builtin.apt:
    name:
      # Core i3 packages
      - i3
      - i3blocks
      - i3lock
      - rofi
      - picom
      - feh
      - scrot
      - xautolock
      - dunst
      - xclip # snippets.sh
    state: latest
    update_cache: true

- name: Install X11 utilities
  ansible.builtin.apt:
    name:
      - x11-xserver-utils # xset, xrandr
      - x11-xkb-utils # setxkbmap
      - xinput
      - xserver-xorg-input-libinput
      - libinput-tools
      - wmctrl
    state: latest

- name: Clone libinput-gestures
  ansible.builtin.git:
    repo: https://github.com/bulletmark/libinput-gestures.git
    dest: /tmp/libinput-gestures
    version: master
    update: true

- name: Install libinput-gestures
  ansible.builtin.command:
    cmd: ./libinput-gestures-setup install
    chdir: /tmp/libinput-gestures
    creates: /usr/bin/libinput-gestures-setup

- name: Add user to input group
  ansible.builtin.user:
    name: "{{ i3_user_name }}"
    groups: input
    append: true

- name: Install screenshot and image tools
  ansible.builtin.apt:
    name:
      - flameshot
      - imagemagick # convert for lock script
    state: latest

- name: Install system utilities
  ansible.builtin.apt:
    name:
      - light # screen brightness control
      - bc # calculator for scripts
      - jq # JSON parser
      - curl
      - htop
      - build-essential
      - pkg-config
      - libssl-dev
      - libdbus-1-dev
      - libpulse-dev
      - libsensors-dev
      - libxcb-randr0-dev
      - libxcb-keysyms1-dev
      - libgtk-3-dev
      - libnotify-dev
      - playerctl # media keys
      - pulseaudio-utils # pactl for volume scripts
      - alsa-utils # amixer fallback for i3-volume
      - upower # battery-plus
      - lm-sensors # sensors for temperature scripts
      - dbus-bin # dbus-send for notification checks
      - iproute2 # ip route for network scripts
      - bsdextrautils # column for i3status-rs k8s popup
      - psmisc # fuser for webcam script
      - dnsutils # dig command
      - wireless-tools # iwgetid for ssid script
      - libnotify-bin # notify-send
      - xdotool # for snippets script
    state: latest

- name: Install network and autostart tools
  ansible.builtin.apt:
    name:
      - network-manager # nmtui (TUI), nmcli (CLI) - TUI альтернатива nm-applet
      - network-manager-gnome # nm-applet tray icon
      - bluez # bluetooth block
      - dex # XDG autostart (CLI утилита)
    state: latest

- name: Install terminal and GUI tools
  ansible.builtin.apt:
    name:
      - tilix
      - nautilus
      - cpupower-gui
      - zenity
      - fonts-font-awesome
    state: latest

- name: Install rustup script
  become: false
  ansible.builtin.get_url:
    url: https://sh.rustup.rs
    dest: /tmp/rustup-init.sh
    mode: "0755"

- name: Install Rust toolchain via rustup
  become: false
  ansible.builtin.command:
    cmd: /tmp/rustup-init.sh -y --profile minimal --default-toolchain stable
    creates: "{{ i3_user_home }}/.cargo/bin/cargo"

- name: Install i3status-rs via cargo
  become: false
  ansible.builtin.command:
    cmd: "{{ i3_user_home }}/.cargo/bin/cargo install --locked i3status-rs"
    creates: "{{ i3_user_home }}/.cargo/bin/i3status-rs"

- name: Install wiremix via cargo
  become: false
  ansible.builtin.command:
    cmd: "{{ i3_user_home }}/.cargo/bin/cargo install --locked wiremix"
    creates: "{{ i3_user_home }}/.cargo/bin/wiremix"

- name: Copy i3status-rs to system path
  ansible.builtin.copy:
    remote_src: true
    src: "{{ i3_user_home }}/.cargo/bin/i3status-rs"
    dest: /usr/local/bin/i3status-rs
    mode: "0755"

- name: Copy wiremix to system path
  ansible.builtin.copy:
    remote_src: true
    src: "{{ i3_user_home }}/.cargo/bin/wiremix"
    dest: /usr/local/bin/wiremix
    mode: "0755"

